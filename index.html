<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SIGAP DESA</title>

<style>

body{

font-family:system-ui;

margin:0;

background:#f4f7fb;

}

.header{

background:#c8a96a;

color:white;

padding:20px;

border-radius:0 0 20px 20px;

}

.card{

background:white;

margin:15px;

padding:15px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#c8a96a;

color:white;

margin-top:10px;

}

input{

width:100%;

padding:12px;

margin-top:10px;

border-radius:10px;

border:1px solid #ddd;

}

.page{

display:none;

}

.active{

display:block;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:10px;

}

</style>

</head>

<body>

<div id="login" class="page active">

<div class="header">

<h2>SIGAP DESA</h2>

</div>

<div class="card">

<input id="u" placeholder="Username">

<input id="p" type="password" placeholder="Password">

<button onclick="login()">

LOGIN

</button>

</div>

</div>

<div id="home" class="page">

<div class="header">

<h2 id="nama"></h2>

<p id="jabatan"></p>

</div>

<div class="card">

<h3>Statistik</h3>

<p>Hadir : <span id="hadir"></span></p>

</div>

<div class="card">

<button onclick="loadHistory()">

History

</button>

<button onclick="openIzin()">

Izin

</button>

</div>

</div>

<div id="history" class="page">

<div class="header">

<h2>History</h2>

</div>

<div class="card">

<div id="list">

</div>

<button onclick="openHome()">

Kembali

</button>

</div>

</div>

<div id="izin" class="page">

<div class="header">

<h2>Izin</h2>

</div>

<div class="card">

<input id="ket">

<button onclick="kirimIzin()">

Kirim

</button>

<button onclick="openHome()">

Kembali

</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzsrXtcB_AtU1Z5X4j0c_b0hgwiVphM9_GqsxFX199YAnwZdE5I8LtMm_rWgenhmd43/exec";

function page(id){

document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");

}

async function login(){

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"login",

username:u.value,

password:p.value,

key:"SIGAP2026"

})

});

let data=
await res.json();

if(data.status){

localStorage.nama=data.nama;

localStorage.jabatan=data.jabatan;

nama.innerText=data.nama;

jabatan.innerText=data.jabatan;

loadDashboard();

page("home");

}
else{

alert("Login gagal");

}

}

async function loadDashboard(){

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"dashboard",

nama:localStorage.nama,

key:"SIGAP2026"

})

});

let d=
await res.json();

hadir.innerText=d.hadir;

}

async function loadHistory(){

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"history",

nama:localStorage.nama,

key:"SIGAP2026"

})

});

let d=
await res.json();

let html="";

d.data.forEach(r=>{

html+=r[0]+" "+r[3]+"<br>";

});

list.innerHTML=html;

page("history");

}

async function kirimIzin(){

await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"izin",

nama:localStorage.nama,

ket:ket.value,

key:"SIGAP2026"

})

});

alert("Izin terkirim");

page("home");

}

function openHome(){

page("home");

}

function openIzin(){

page("izin");

}

</script>

</body>

</html>
