<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SIGAP DESA</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:system-ui;

}

body{

background:#f4f7fb;

}

.header{

background:linear-gradient(135deg,#c8a96a,#8b6f3d);

color:white;

padding:20px;

border-radius:0 0 25px 25px;

}

.header h2{

font-size:20px;

}

.container{

padding:15px;

padding-bottom:90px;

}

.card{

background:white;

padding:15px;

border-radius:15px;

margin-bottom:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.08);

}

button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#c8a96a;

color:white;

font-size:15px;

margin-top:10px;

}

input{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #ddd;

margin-top:8px;

}

.page{

display:none;

}

.active{

display:block;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:12px;

box-shadow:0 -5px 20px rgba(0,0,0,0.08);

}

.nav{

text-align:center;

font-size:12px;

color:#777;

}

.nav div{

font-size:22px;

}

.stat{

display:flex;

justify-content:space-between;

margin-top:10px;

}

.box{

background:#fafafa;

padding:10px;

border-radius:10px;

width:32%;

text-align:center;

}

.dark{

background:#1e1e1e;

color:white;

}

.dark .card{

background:#2b2b2b;

color:white;

}

.dark .bottom{

background:#2b2b2b;

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="page active">

<div class="header">

<h2>SIGAP DESA</h2>

<p>Sistem Absensi Digital</p>

</div>

<div class="container">

<div class="card">

<h3>Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">

MASUK

</button>

</div>

</div>

</div>

<!-- DASHBOARD -->

<div id="homePage" class="page">

<div class="header">

<h2 id="namaUser"></h2>

<p>Dashboard</p>

</div>

<div class="container">

<div class="card">

<h3>Statistik</h3>

<div class="stat">

<div class="box">

Hadir

<h2 id="hadir">

0

</h2>

</div>

<div class="box">

Izin

<h2>

0

</h2>

</div>

<div class="box">

Cuti

<h2>

0

</h2>

</div>

</div>

</div>

<div class="card">

<h3>Absensi</h3>

<button>

ABSEN MASUK

</button>

<button>

ABSEN PULANG

</button>

</div>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="header">

<h2>History</h2>

</div>

<div class="container">

<div id="historyList">

</div>

</div>

</div>

<!-- IZIN -->

<div id="izinPage" class="page">

<div class="header">

<h2>Izin</h2>

</div>

<div class="container">

<div class="card">

<input placeholder="Keterangan">

<button>

Kirim Izin

</button>

</div>

</div>

</div>

<!-- PROFILE -->

<div id="profilePage" class="page">

<div class="header">

<h2>Profile</h2>

</div>

<div class="container">

<div class="card">

<button onclick="toggleDark()">

Dark Mode

</button>

<button onclick="logout()">

Logout

</button>

</div>

</div>

</div>

<!-- NAVIGATION -->

<div class="bottom">

<div class="nav" onclick="openPage('homePage')">

<div>

🏠

</div>

Home

</div>

<div class="nav" onclick="openPage('historyPage')">

<div>

📋

</div>

History

</div>

<div class="nav" onclick="openPage('izinPage')">

<div>

📝

</div>

Izin

</div>

<div class="nav" onclick="openPage('profilePage')">

<div>

👤

</div>

Profile

</div>

</div>

<script>

function openPage(id){

document
.querySelectorAll(".page")
.forEach(p=>{

p.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

}

function login(){

namaUser.innerText=user.value;

openPage("homePage");

}

function logout(){

openPage("loginPage");

}

function toggleDark(){

document.body
.classList.toggle("dark");

}

</script>

</body>

</html>
