<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SIGAP DESA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#f4f7fb;
}

.header{
background:linear-gradient(135deg,#c8a96a,#8b6f3d);
color:white;
padding:20px;
border-radius:0 0 25px 25px;
}

.container{
padding:15px;
padding-bottom:90px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#c8a96a;
color:white;
font-size:15px;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:8px;
}

.page{
display:none;
}

.active{
display:block;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -5px 20px rgba(0,0,0,0.08);
}

.nav{
text-align:center;
font-size:12px;
color:#777;
cursor:pointer;
}

.nav div{
font-size:22px;
}

.stat{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.box{
background:#fafafa;
padding:10px;
border-radius:10px;
width:32%;
text-align:center;
}

.dark{
background:#1e1e1e;
color:white;
}

.dark .card{
background:#2b2b2b;
color:white;
}

.dark .bottom{
background:#2b2b2b;
}

.loading{

background:#00000080;

position:fixed;

width:100%;

height:100%;

display:none;

align-items:center;

justify-content:center;

color:white;

font-size:18px;

z-index:999;

}

</style>

</head>

<body>

<div class="loading" id="loading">

Loading...

</div>

<!-- LOGIN -->

<div id="loginPage" class="page active">

<div class="header">

<h2>SIGAP DESA</h2>

<p>Sistem Absensi Digital</p>

</div>

<div class="container">

<div class="card">

<h3>Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">

MASUK

</button>

</div>

</div>

</div>

<!-- HOME -->

<div id="homePage" class="page">

<div class="header">

<h2 id="namaUser">

User

</h2>

<p id="jabatanUser">

Jabatan

</p>

</div>

<div class="container">

<div class="card">

<h3>Statistik Bulan Ini</h3>

<div class="stat">

<div class="box">

Hadir

<h2 id="hadir">

0

</h2>

</div>

<div class="box">

Izin

<h2 id="izin">

0

</h2>

</div>

<div class="box">

Cuti

<h2 id="cuti">

0

</h2>

</div>

</div>

</div>

<div class="card">

<h3>Absensi</h3>

<button onclick="absenMasuk()">

ABSEN MASUK

</button>

<button onclick="absenPulang()">

ABSEN PULANG

</button>

</div>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage" class="page">

<div class="header">

<h2>History Absensi</h2>

</div>

<div class="container">

<div class="card">

<div id="historyList">

Belum ada data

</div>

</div>

</div>

</div>

<!-- IZIN -->

<div id="izinPage" class="page">

<div class="header">

<h2>Pengajuan Izin</h2>

</div>

<div class="container">

<div class="card">

<input id="ketIzin" placeholder="Keterangan">

<button onclick="kirimIzin()">

Kirim Izin

</button>

</div>

</div>

</div>

<!-- PROFILE -->

<div id="profilePage" class="page">

<div class="header">

<h2>Profile</h2>

</div>

<div class="container">

<div class="card">

<p id="profileNama"></p>

<p id="profileJabatan"></p>

<p id="profileRole"></p>

<button onclick="toggleDark()">

Dark Mode

</button>

<button onclick="logout()">

Logout

</button>

</div>

</div>

</div>

<!-- NAV -->

<div class="bottom">

<div class="nav" onclick="openPage('homePage')">

<div>

🏠

</div>

Home

</div>

<div class="nav" onclick="openPage('historyPage')">

<div>

📋

</div>

History

</div>

<div class="nav" onclick="openPage('izinPage')">

<div>

📝

</div>

Izin

</div>

<div class="nav" onclick="openPage('profilePage')">

<div>

👤

</div>

Profile

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzv04FE5KNG1ad1LrjDNHVAyKVu8CRD8HIGan-WeaLTG_1r-HzTH5xZHdMZFgXmBnwn/exec";

function loading(x){

document
.getElementById("loading")
.style.display=x;

}

function openPage(id){

document
.querySelectorAll(".page")
.forEach(p=>{

p.classList.remove("active");

});

document
.getElementById(id)
.classList.add("active");

}

async function login(){

let u=user.value;

let p=pass.value;

if(u==""||p==""){

alert("Isi login");

return;

}

loading("flex");

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"login",

username:u,

password:p,

key:"SIGAP2026"

})

});

let data=
await res.json();

loading("none");

if(data.status){

localStorage.nama=data.nama;

localStorage.jabatan=data.jabatan;

localStorage.role=data.role;

initDashboard();

openPage("homePage");

}
else{

alert("Login gagal");

}

}

function initDashboard(){

namaUser.innerText=
localStorage.nama;

jabatanUser.innerText=
localStorage.jabatan;

profileNama.innerText=
"Nama : "+localStorage.nama;

profileJabatan.innerText=
"Jabatan : "+localStorage.jabatan;

profileRole.innerText=
"Role : "+localStorage.role;

}

function logout(){

localStorage.clear();

openPage("loginPage");

}

function toggleDark(){

document.body
.classList.toggle("dark");

}

function absenMasuk(){

alert("Module 3 kamera + GPS");

}

function absenPulang(){

alert("Module 3 kamera + GPS");

}

function kirimIzin(){

alert("Module 4 izin system");

}

window.onload=function(){

if(localStorage.nama){

initDashboard();

openPage("homePage");

}

}

</script>

</body>

</html>
