<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Absensi Desa</title>

<style>

body{

margin:0;

font-family:system-ui;

background:#f4f6f9;

}

.header{

background:#ff6b6b;

color:white;

padding:20px;

border-radius:0 0 20px 20px;

}

.card{

background:white;

margin:15px;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#ff6b6b;

color:white;

font-size:16px;

margin-top:10px;

}

input{

width:100%;

padding:12px;

margin:5px 0;

border-radius:10px;

border:1px solid #ddd;

}

.menu{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.menu button{

background:white;

color:black;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.stat{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

}

.stat div{

background:#fff;

padding:15px;

border-radius:10px;

text-align:center;

box-shadow:0 3px 10px rgba(0,0,0,0.1);

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:10px;

box-shadow:0 -3px 10px rgba(0,0,0,0.1);

}

.hidden{

display:none;

}

</style>

</head>

<body>

<div id="loginPage">

<div class="header">

<h2>Absensi Desa</h2>

</div>

<div class="card">

<h3>Login</h3>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">

LOGIN

</button>

</div>

</div>

<div id="dashboard" class="hidden">

<div class="header">

<h2 id="namaUser">

Dashboard

</h2>

<p>

Jam kerja 07:30 - 16:00

</p>

</div>

<div class="card">

<h3>Absensi</h3>

<button onclick="absenMasuk()">

ABSEN MASUK

</button>

<button onclick="absenPulang()">

ABSEN PULANG

</button>

</div>

<div class="card">

<h3>Statistik</h3>

<div class="stat">

<div>

<h2 id="hadir">

0

</h2>

<p>Hadir</p>

</div>

<div>

<h2 id="izin">

0

</h2>

<p>Izin</p>

</div>

</div>

</div>

<div class="card">

<h3>Menu</h3>

<div class="menu">

<button>History</button>

<button>Izin</button>

<button>Cuti</button>

<button>Profil</button>

</div>

</div>

</div>

<div class="bottom">

Home

Absen

History

Profil

</div>

<script>

const API=

"https://script.google.com/macros/s/AKfycby7US4cTwebBFmXJ8O4Wo8gMk2fWr3NQz0fbqb4WFLwLzhWWqtEtOMAJ1XGHQ7CuATw/exec";

async function login()
{

let u=
document.getElementById("user").value;

let p=
document.getElementById("pass").value;

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"login",

username:u,

password:p,

key:"SIGAP2026"

})

});

let data=
await res.json();

if(data.status)
{

localStorage.nama=data.nama;

localStorage.jabatan=data.jabatan;

document.getElementById("loginPage")
.classList.add("hidden");

document.getElementById("dashboard")
.classList.remove("hidden");

document.getElementById("namaUser")
.innerText=data.nama;

}
else
{

alert("Login gagal");

}

}

function getGPS()
{

return new Promise((resolve)=>{

navigator.geolocation.getCurrentPosition(

pos=>{

resolve({

lat:pos.coords.latitude,

lng:pos.coords.longitude

});

}

);

});

}

async function absenMasuk()
{

let gps=
await getGPS();

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"absenMasuk",

nama:localStorage.nama,

jabatan:localStorage.jabatan,

lat:gps.lat,

lng:gps.lng,

foto:"",

key:"SIGAP2026"

})

});

let data=
await res.json();

if(data.status)
{

alert("Absensi masuk berhasil");

}
else
{

alert("Gagal");

}

}

async function absenPulang()
{

alert("Fitur berikutnya");

}

</script>

</body>

</html>
