<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Absensi Desa</title>

<style>

body{

margin:0;

font-family:system-ui;

background:#f1f4f9;

}

.header{

background:#ff6b6b;

color:white;

padding:20px;

border-radius:0 0 20px 20px;

}

.card{

background:white;

margin:15px;

padding:15px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#ff6b6b;

color:white;

font-size:16px;

margin-top:10px;

}

input{

width:100%;

padding:12px;

margin:5px 0;

border-radius:10px;

border:1px solid #ddd;

}

video{

width:100%;

border-radius:10px;

}

.hidden{

display:none;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:10px;

box-shadow:0 -3px 10px rgba(0,0,0,0.1);

}

</style>

</head>

<body>

<div id="login">

<div class="header">

<h2>Absensi Desa</h2>

</div>

<div class="card">

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">

LOGIN

</button>

</div>

</div>

<div id="app" class="hidden">

<div class="header">

<h2 id="nama"></h2>

<p>Dashboard</p>

</div>

<div class="card">

<h3>Camera</h3>

<video id="video" autoplay></video>

<button onclick="startCamera()">

Buka Kamera

</button>

<button onclick="capture('masuk')">

Absen Masuk

</button>

<button onclick="capture('pulang')">

Absen Pulang

</button>

</div>

<div class="card">

<h3>Ajukan Izin</h3>

<input id="ket" placeholder="Keterangan">

<button onclick="izin()">

Kirim Izin

</button>

</div>

<div class="card">

<h3>History</h3>

<div id="history">

</div>

<button onclick="loadHistory()">

Refresh

</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz6bsPOFty1z1caTEChZug-6xppXcxPQqXxvVTtDDi3jCjfu4CSh0sFzt9W66wsCdiQ/exec";

let stream;

async function login()
{

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"login",

username:user.value,

password:pass.value,

key:"SIGAP2026"

})

});

let data=await res.json();

if(data.status)
{

localStorage.nama=data.nama;

localStorage.jabatan=data.jabatan;

login.classList.add("hidden");

app.classList.remove("hidden");

nama.innerText=data.nama;

loadHistory();

}

else
alert("Login gagal");

}

async function startCamera()
{

stream=
await navigator.mediaDevices.getUserMedia({

video:true

});

video.srcObject=stream;

}

function gps()
{

return new Promise(res=>{

navigator.geolocation.getCurrentPosition(

p=>{

res({

lat:p.coords.latitude,

lng:p.coords.longitude

});

}

);

});

}

async function capture(type)
{

let canvas=
document.createElement("canvas");

canvas.width=300;

canvas.height=300;

let ctx=
canvas.getContext("2d");

ctx.drawImage(video,0,0);

let img=
canvas.toDataURL("image/jpeg")
.split(",")[1];

let g=
await gps();

let act=
type=="masuk"?
"absenMasuk":
"absenPulang";

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:act,

nama:localStorage.nama,

jabatan:localStorage.jabatan,

foto:img,

lat:g.lat,

lng:g.lng,

key:"SIGAP2026"

})

});

let d=
await res.json();

alert("Berhasil");

loadHistory();

}

async function loadHistory()
{

let res=
await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"history",

nama:localStorage.nama,

key:"SIGAP2026"

})

});

let d=
await res.json();

history.innerHTML="";

d.data.forEach(r=>{

history.innerHTML+=

"<div class='card'>"+

r[1]+"<br>"+

r[4]+" - "+

r[5]+

"</div>";

});

}

async function izin()
{

await fetch(API,{

method:"POST",

body:new URLSearchParams({

action:"izin",

nama:localStorage.nama,

ket:ket.value,

key:"SIGAP2026"

})

});

alert("Izin dikirim");

}

</script>

</body>

</html>
