<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SIGAP DESA</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f7fb;
}

.header{
background:linear-gradient(135deg,#c8a96a,#8b6f3d);
color:white;
padding:20px;
border-radius:0 0 20px 20px;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#c8a96a;
color:white;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

.page{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<div id="login" class="page active">

<div class="header">
<h2>SIGAP DESA</h2>
</div>

<div class="card">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

</div>

</div>

<div id="home" class="page">

<div class="header">
<h2 id="nama"></h2>
<p id="jabatan"></p>
</div>

<div class="card">

<button onclick="absenMasuk()">ABSEN MASUK</button>
<button onclick="absenPulang()">ABSEN PULANG</button>
<button onclick="loadHistory()">HISTORY</button>

</div>

</div>

<div id="history" class="page">

<div class="header">
<h2>History</h2>
</div>

<div class="card">

<div id="list"></div>

<button onclick="openPage('home')">Kembali</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxlYTt1_gDgCF9VyX2jn-P9IiSbJlQQ8Xl--I8i6fz5sidhCIrAZThJUsKbXfOjByuf/exec"

function openPage(id){

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

async function login(){

let r=await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:user.value,
password:pass.value,
key:"SIGAP2026"
})
});

let d=await r.json();

if(d.status){

localStorage.nama=d.nama;
localStorage.jabatan=d.jabatan;

nama.innerText=d.nama;
jabatan.innerText=d.jabatan;

openPage("home");

}else{

alert("Login gagal");

}

}

async function absenMasuk(){

navigator.geolocation.getCurrentPosition(async pos=>{

let r=await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"absenMasuk",
nama:localStorage.nama,
jabatan:localStorage.jabatan,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
foto:"",
device:navigator.userAgent,
key:"SIGAP2026"
})
});

alert("Absen masuk berhasil");

});

}

async function absenPulang(){

navigator.geolocation.getCurrentPosition(async pos=>{

await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"absenPulang",
nama:localStorage.nama,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
foto:"",
device:navigator.userAgent,
key:"SIGAP2026"
})
});

alert("Absen pulang berhasil");

});

}

async function loadHistory(){

let r=await fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"history",
nama:localStorage.nama,
key:"SIGAP2026"
})
});

let d=await r.json();

let html="";

d.data.forEach(r=>{

html+=r[1]+" "+r[4]+"<br>";

});

list.innerHTML=html;

openPage("history");

}

</script>

</body>
</html>
